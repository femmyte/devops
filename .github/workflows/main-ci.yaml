on:
    push:
        branches:
            - main

jobs:
    build:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write

        steps:
            - name: Checkout
              uses: actions/checkout@v5

            - name: Run dev secops
              if: always()
              uses: ./.github/workflows/devsecops.yaml

            - name: Build and deploy
              if: always()
              uses: ./.github/workflows/frontend-ci.yaml
