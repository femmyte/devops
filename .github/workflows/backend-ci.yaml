on:
    workflow_call:
name: Frontend CI
env:
    DOCKER_REPO: femmyte
    IMAGE_NAME: linker-backend
    DATABASE_URL: ${{secrets.DATABASE_URL}}
jobs:
    slack-notify:
        runs-on: ubuntu-latest
        steps:
            - name: Slack Notification
              uses: rtCamp/action-slack-notify@v2
              env:
                  SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
                  SLACK_TITLE: Docker Build Pipeline Triggered
                  SLACK_MESSAGE: |
                      **Event:** ${{ github.event_name }}

                      **Actor:** ${{ github.actor }}

                      **Branch:** ${{ github.ref_name }}

                      **Commit:** ${{ github.event.head_commit.message }}

    build:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write

        steps:
            - name: Checkout
              uses: actions/checkout@v5

            - name: Login to Docker Hub
              uses: docker/login-action@v4
              with:
                  username: ${{ env.DOCKER_REPO }}
                  password: ${{ secrets.DOCKERHUB_TOKEN }}

            # - name: Set up QEMU
            #   uses: docker/setup-qemu-action@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v4

            - name: Generate Docker Image Tag
              id: tag
              uses: docker/metadata-actions@v5
              with:
                  images: docker.io/${{env.DOCKER_REPO}}/${{env.IMAGE_NAME}}
                  tags: |
                      type=sha,format=short

            - name: Build Docker Image
              uses: docker/build-push-action@v7
              with:
                  context:
                  load: true
                  tags: ${{steps.tag.outputs.tags}}
                  build-args: |
                      DATABASE_URL=${{env.DATABASE_URL}}

            - name: Install Trivy
              run: |
                  curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
                  | sh -s -- -b /usr/local/bin

            - name: Scan Docker Image for Vulnerabilities
              run: |
                  trivy image \
                  --format table \
                  --exit-code: 1 \
                  --ignore-unfixed: \
                  --severity CRITICAL,HIGH \
                  "${{ steps.tag.outputs.tags }}" \
                  | tee trivy-report.txt

            - name: Upload Scan Report
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: trivy-report
                  path: trivy-report.txt

            - name: Push Image to Dcker Hub
              uses: docker/build-push-actions@v7
              with:
                  context: .
                  push: true
                  tags: ${{ steps.tag.outputs.tags }}

            - name: Slack Notification
              if: always()
              uses: rtCamp/action-slack-notify@v2
              env:
                  SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
                  SLACK_COLOR: ${{ job.status }}
                  SLACK_TITLE: Docker Build Pipeline Triggered
                  SLACK_MESSAGE: |
                      Docker pipeline *${{ job.status }}*
                      **Actor:** ${{ github.actor }}

                      **Branch:** ${{ github.ref_name }}

                      **Commit:** ${{ github.event.head_commit.message }}
                      logs: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
